<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aiven Rental - Developer Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="no-top-headers">
  <div class="app-shell">
    <div class="layout">
      <div>
        <header class="topbar">
          <div class="topbar-inner">
            <div class="topbar-brand" aria-label="Aiven Rental developer portal">
              <span class="topbar-mark">AR</span>
              <span class="topbar-title">Developer <span class="topbar-title-accent">Portal</span></span>
            </div>
          </div>
        </header>

        <main class="grid">
          <section class="card wide" style="max-width:520px; margin:40px auto 0;">
            <div class="card-header">
              <div>
                <h2>Developer login</h2>
                <p class="hint" style="margin:6px 0 0;">Enter the developer password to access monitoring tools.</p>
              </div>
            </div>

            <form id="dev-login-form" class="stack">
              <label>Password
                <input id="dev-password" type="password" autocomplete="current-password" required />
              </label>
              <div class="inline-actions">
                <button class="primary" id="dev-login-btn" type="submit">Sign in</button>
              </div>
              <p class="hint" id="dev-login-status" style="margin:0;"></p>
            </form>
          </section>
        </main>
      </div>
    </div>
  </div>

  <script src="dev-session.js"></script>
  <script src="dev-login.js"></script>
</body>
</html>
